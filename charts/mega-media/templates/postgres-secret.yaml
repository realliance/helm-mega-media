{{- if .Values.postgresql.enabled -}}
{{- $secretName := printf "%s-postgresql" .Release.Name -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password := "" -}}
{{- if and $existing $existing.data (hasKey $existing.data "postgres-password") -}}
{{- $password = index $existing.data "postgres-password" | b64dec -}}
{{- else -}}
{{- $password = randAlphaNum 32 -}}
{{- end -}}
{{- $nameInTable := merge (dict "name" "postgresql") . -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "mega-media.labels" $nameInTable | nindent 4 }}
type: Opaque
data:
  postgres-password: {{ $password | b64enc | quote }}
{{- end -}}
