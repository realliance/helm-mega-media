{{- if .Values.postgresql.enabled -}}
{{- $nameInTable := merge (dict "name" "postgresql") . -}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-postgresql" .Release.Name }}
  labels:
    {{- include "mega-media.labels" $nameInTable | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "mega-media.selectorLabels" $nameInTable | nindent 4 }}
{{- end -}}
