{{- with .Values.sabnzbd -}}
{{- if .enabled -}}
{{- $contextWithName := merge (dict "name" "sabnzbd") $ -}}
{{- $apiKey := lower (randAlphaNum 64) -}}

{{- $api_key_secret_name := hasKey . "apiKey" | ternary (get (.apiKey) "name") (printf "%s-api-key" (include "mega-media.name" $contextWithName)) -}}
{{- $api_key_secret_key := hasKey . "apiKey" | ternary (get (.apiKey) "key") "key" -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mega-media.name" $contextWithName }}
  labels:
    {{- include "mega-media.labels" $contextWithName | nindent 4 }}
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      {{- include "mega-media.selectorLabels" $contextWithName | nindent 6 }}
  template:
    metadata:
      annotations:
        # SAB reads arr-config via envFrom (never live-updates); roll on change.
        checksum/config: {{ include (print $.Template.BasePath "/arr-config.yaml") $ | sha256sum }}
        {{- with $.Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "mega-media.labels" $contextWithName | nindent 8 }}
        {{- with $.Values.podLabels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $.Values.nodeName }}
      nodeName: {{ $.Values.nodeName | quote }}
      {{- end }}
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      affinity:
        {{- include "mega-media.sameNodePodAffinity" $contextWithName | nindent 10 }}
      initContainers:
        {{- range .servers -}}
          {{- include "mega-media.sabnzbd.server" . | nindent 8 }}
        {{- end }}
        - name: init-ini
          image: docker.io/busybox:1
          command: 
            - 'sh'
            - '-c'
            - |
              echo "
              __version__ = 19
              __encoding__ = utf-8
              [misc]
              api_key = "$API_KEY"
              nzb_key = "$API_KEY"
              " > /config/sabnzbd.ini && chmod 666 /config/sabnzbd.ini

              echo '
              {{ .ini | nindent 14 }}
              ' >> /config/sabnzbd.ini

              echo "
              [servers]
              $(cat /config-stubs/stub-*)
              " >> /config/sabnzbd.ini

              cat /config/sabnzbd.ini
          volumeMounts:
            - mountPath: /config-stubs
              name: config-file
            - mountPath: /config
              name: config
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $api_key_secret_name }}
                  key: {{ $api_key_secret_key }}
      containers:
        - name: sabnzbd
          image: "{{ .image }}:{{ .tag }}"
          imagePullPolicy: {{ .pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .port }}
              protocol: TCP
          livenessProbe:
            {{- .livenessProbe | toYaml | nindent 12 }}
          readinessProbe:
            {{- .readinessProbe | toYaml | nindent 12 }}
          resources:
            {{- toYaml .resources | nindent 12 }}
          volumeMounts:
          - mountPath: /media
            name: media
          - mountPath: /config
            name: config
          envFrom:
          - configMapRef:
              name: {{ include "mega-media.name" (merge (dict "name" "arr-config") $) }}
        {{- if $.Values.metrics.enabled }}
        # exportarr sabnzbd collector. URL must include SAB's url_base (set to
        # /sabnzbd in the ini) or the API probe 404s. Same API key the app uses.
        - name: exportarr
          image: "{{ $.Values.metrics.image }}:{{ $.Values.metrics.tag }}"
          imagePullPolicy: {{ $.Values.metrics.pullPolicy }}
          args: ["sabnzbd"]
          env:
            - name: PORT
              value: {{ $.Values.metrics.port | quote }}
            - name: URL
              value: "http://localhost:{{ .port }}/sabnzbd"
            - name: APIKEY
              valueFrom:
                secretKeyRef:
                  name: {{ $api_key_secret_name }}
                  key: {{ $api_key_secret_key }}
            - name: ENABLE_ADDITIONAL_METRICS
              value: "true"
          ports:
            - name: metrics
              containerPort: {{ $.Values.metrics.port }}
              protocol: TCP
          resources:
            {{- toYaml $.Values.metrics.resources | nindent 12 }}
        {{- end }}
      volumes:
      - name: config-file
        emptyDir:
          medium: Memory
      - name: media
        persistentVolumeClaim:
          claimName: {{ include "mega-media.name" (merge (dict "name" "media") $) }}
      - name: config
        persistentVolumeClaim:
          claimName: {{ include "mega-media.name" $contextWithName }}-config

{{ with .config -}}
{{ template "mega-media.config.pvc" (merge (dict "storageClassName" .storageClassName "size" .size ) $contextWithName) }}
{{- end }}

{{ template "mega-media.service" (merge (dict "port" .port "targetPort" .port "metricsSidecar" true) $contextWithName) }}
{{ if hasKey . "apiKey" | not }}
{{ template "mega-media.api-key-secret" (merge (dict "apiKey" $apiKey) $contextWithName) }}
{{- end }}
{{- end }}
{{- end }}